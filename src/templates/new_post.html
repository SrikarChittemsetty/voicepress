{% extends "base.html" %}

{% block title %}New Post - New Project Blog{% endblock %}

{% block content %}
  <h1>Create New Post</h1>
  <form method="post" action="{{ url_for('new_post') }}">
    <div>
      <label for="title">Title</label><br>
      <input type="text" id="title" name="title" required>
    </div>

    <div>
      <label for="body">Body</label><br>
      <textarea id="body" name="body" rows="10" cols="60" required></textarea>
      <p>Markdown tips: <code># Heading</code>, <code>**bold**</code>, <code>*italic*</code>, <code>- list item</code>, <code>[link text](https://example.com)</code></p>
      <div class="markdown-preview">
        <h3>Live Preview</h3>
        <div id="markdown-preview-content" class="markdown-preview-content"></div>
      </div>
    </div>

    <div>
      <label for="excerpt">Excerpt (optional)</label><br>
      <textarea id="excerpt" name="excerpt" rows="3" cols="60" placeholder="Short summary shown in previews"></textarea>
    </div>

    <div>
      <label for="cover_image_url">Cover Image URL (optional)</label><br>
      <input
        id="cover_image_url"
        name="cover_image_url"
        type="url"
        placeholder="https://example.com/image.jpg"
      >
    </div>

    <div>
      <label for="visibility">Visibility</label><br>
      <select id="visibility" name="visibility">
        <option value="public">Public</option>
        <option value="private">Private</option>
      </select>
    </div>

    <div>
      <label for="status">Status</label><br>
      <select id="status" name="status">
        <option value="draft">Draft</option>
        <option value="published">Published</option>
      </select>
    </div>

    <div>
      <label for="tags">Tags</label><br>
      <input id="tags" name="tags" type="text" placeholder="python, flask, sqlite">
    </div>

    <div>
      <label for="category">Category (optional)</label><br>
      <input id="category" name="category" type="text" placeholder="e.g. Tutorials">
    </div>

    <button class="btn" type="submit">Save post</button>
  </form>

  <script>
    (function () {
      const bodyInput = document.getElementById("body");
      const preview = document.getElementById("markdown-preview-content");

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function inlineMarkdown(text) {
        let html = text;
        html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
        return html;
      }

      function renderPreview() {
        const raw = bodyInput.value || "";
        const lines = raw.split("\n");
        const htmlParts = [];
        let listItems = [];

        function flushList() {
          if (listItems.length > 0) {
            htmlParts.push("<ul>" + listItems.join("") + "</ul>");
            listItems = [];
          }
        }

        for (const line of lines) {
          const safeLine = escapeHtml(line.trim());
          if (safeLine.startsWith("- ")) {
            listItems.push("<li>" + inlineMarkdown(safeLine.slice(2)) + "</li>");
            continue;
          }

          flushList();

          if (!safeLine) {
            htmlParts.push("<br>");
            continue;
          }

          if (safeLine.startsWith("# ")) {
            htmlParts.push("<h1>" + inlineMarkdown(safeLine.slice(2)) + "</h1>");
          } else {
            htmlParts.push("<p>" + inlineMarkdown(safeLine) + "</p>");
          }
        }

        flushList();
        preview.innerHTML = htmlParts.join("");
      }

      bodyInput.addEventListener("input", renderPreview);
      renderPreview();
    })();
  </script>
{% endblock %}
