{% extends "base.html" %}

{% block title %}New Post - New Project Blog{% endblock %}

{% block content %}
  <h1>Create New Post</h1>
  <form method="post" action="{{ url_for('new_post') }}">
    <div>
      <label for="title">Title</label><br>
      <input type="text" id="title" name="title" required>
    </div>

    <div>
      <label for="body">Body</label><br>
      <textarea id="body" name="body" rows="10" cols="60" required></textarea>
      <p>Markdown tips: <code># Heading</code>, <code>**bold**</code>, <code>*italic*</code>, <code>- list item</code>, <code>[link text](https://example.com)</code></p>
    </div>

    <div>
      <label for="visibility">Visibility</label><br>
      <select id="visibility" name="visibility">
        <option value="public">Public</option>
        <option value="private">Private</option>
      </select>
    </div>

    <div>
      <label for="status">Status</label><br>
      <select id="status" name="status">
        <option value="draft">Draft</option>
        <option value="published">Published</option>
      </select>
    </div>

    <div>
      <label for="tags">Tags</label><br>
      <input id="tags" name="tags" type="text" placeholder="python, flask, sqlite">
    </div>

    <button type="submit">Save Post</button>
  </form>
{% endblock %}
