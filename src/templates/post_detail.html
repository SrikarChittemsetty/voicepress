{% extends "base.html" %}

{% block title %}{{ post.title }} - New Project Blog{% endblock %}

{% block content %}
  <article>
    <h1>{{ post.title }}</h1>
    <p>By {{ post.username }} on {{ post.created_at }}</p>
    {% if post.tags %}
      <p>Tags: {{ post.tags }}</p>
    {% endif %}
    <p>{{ post.body }}</p>
  </article>
{% endblock %}
