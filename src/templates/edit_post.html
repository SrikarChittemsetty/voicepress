{% extends "base.html" %}

{% block title %}Edit Post - New Project Blog{% endblock %}

{% block content %}
  <h1>Edit Post</h1>
  <form method="post" action="{{ url_for('edit_post', post_id=post.id) }}">
    <div>
      <label for="title">Title</label><br>
      <input type="text" id="title" name="title" value="{{ post.title }}" required>
    </div>

    <div>
      <label for="body">Body</label><br>
      <textarea id="body" name="body" rows="10" cols="60" required>{{ post.body }}</textarea>
      <p>Markdown tips: <code># Heading</code>, <code>**bold**</code>, <code>*italic*</code>, <code>- list item</code>, <code>[link text](https://example.com)</code></p>
    </div>

    <div>
      <label for="visibility">Visibility</label><br>
      <select id="visibility" name="visibility">
        <option value="public" {% if post.visibility == "public" %}selected{% endif %}>Public</option>
        <option value="private" {% if post.visibility == "private" %}selected{% endif %}>Private</option>
      </select>
    </div>

    <div>
      <label for="status">Status</label><br>
      <select id="status" name="status">
        <option value="draft" {% if post.status == "draft" %}selected{% endif %}>Draft</option>
        <option value="published" {% if post.status == "published" %}selected{% endif %}>Published</option>
      </select>
    </div>

    <div>
      <label for="tags">Tags</label><br>
      <input id="tags" name="tags" type="text" value="{{ post.tags }}">
    </div>

    <button type="submit">Save Changes</button>
  </form>
{% endblock %}
