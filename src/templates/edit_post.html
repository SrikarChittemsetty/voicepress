{% extends "base.html" %}

{% block title %}Edit Post - New Project Blog{% endblock %}

{% block content %}
  <h1>Edit Post</h1>
  <form method="post" action="{{ url_for('edit_post', post_id=post.id) }}">
    <div>
      <label for="title">Title</label><br>
      <input type="text" id="title" name="title" value="{{ post.title }}" required>
    </div>

    <div>
      <label for="body">Body</label><br>
      <textarea id="body" name="body" rows="10" cols="60" required>{{ post.body }}</textarea>
    </div>

    <div>
      <label for="visibility">Visibility</label><br>
      <select id="visibility" name="visibility">
        <option value="public" {% if post.visibility == "public" %}selected{% endif %}>Public</option>
        <option value="private" {% if post.visibility == "private" %}selected{% endif %}>Private</option>
      </select>
    </div>

    <button type="submit">Save Changes</button>
  </form>
{% endblock %}
