{% extends "base.html" %}

{% block title %}Your Profile - New Project Blog{% endblock %}

{% block content %}
  <h1>Edit Profile</h1>
  <p>Manage your public profile details.</p>

  <form method="post" action="{{ url_for('profile') }}">
    <div>
      <label for="display_name">Display Name</label><br>
      <input
        id="display_name"
        name="display_name"
        type="text"
        value="{{ user.display_name or user.username }}"
      >
    </div>

    <div>
      <label for="bio">Bio</label><br>
      <textarea id="bio" name="bio" rows="5" cols="60">{{ user.bio }}</textarea>
    </div>

    <button class="btn" type="submit">Save profile</button>
  </form>
{% endblock %}
